syntax = "proto3";
package emerald.address;
option java_package = "io.emeraldpay.api.proto.address";
import "common.proto";
import "google/protobuf/wrappers.proto";

message DescribeRequest {
  ChainRef chain = 1;
  SingleAddress address = 2;
}

message DescribeResponse {
  // The requested address
  SingleAddress address = 1;
  // True if anything was sent from the address
  bool active = 2;
  // True if address is a contract
  bool is_contract = 6;
  // For a contract, which capabilities it has
  repeated AddressCapability capabilities = 4;
  // Names associated with the address, e.g. a ENS name
  repeated AddressName names = 5;
}

enum AddressCapability {
  CAP_INVALID = 0;
  // Contract is a ERC20 token
  CAP_ERC20 = 1;
}

message AddressName {
  NameRegistry registry = 1;
  string name = 2;
}

enum NameRegistry {
  // An error or corrupted response
  NAME_REPO_UNKNOWN = 0;

  // ENS registry on the requested blockchain
  NAME_REPO_ENS = 1;
}

message DescribeXpubRequest {
  ChainRef chain = 1;
  XpubAddress address = 2;
}

message DescribeXpubResponse {
  ChainRef chain = 1;
  // requested address
  XpubAddress address = 2;
  // last used address
  SingleAddress last_address = 3;
  // last used index
  google.protobuf.UInt32Value last_index = 4;
}
