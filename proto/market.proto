syntax = "proto3";
package emerald;
option java_package = "io.emeraldpay.api.proto";
import "common.proto";

service Market {
    rpc GetRates (GetRatesRequest) returns (GetRatesResponse) {}
}

message GetRatesRequest {
  repeated Pair pairs = 2;
  oneof timestamp_type {
    // timestamp in milliseconds, 0 for latest rate
    uint64 timestamp = 3;
    // reference to a block by height or hash
    BlockRef block = 4;
  }
}

message Pair {
    oneof base_type {
        string base = 1;
        Erc20Asset erc20_base = 3;
    }
    oneof target_type {
        string target = 2;
        Erc20Asset erc20_target = 4;
    }
}

message GetRatesResponse {
    repeated Rate rates = 1;
    // timestamp in milliseconds
    uint64 timestamp = 4;
}

message Rate {
    oneof base_type {
        string base = 1;
        Erc20Asset erc20_base = 4;
    }
    oneof target_type {
        string target = 2;
        Erc20Asset erc20_target = 5;
    }
    string rate = 3;
}

message BlockRef {
  ChainRef blockchain = 1;
  oneof ref_type {
    uint64 height = 2;
    string hash = 3;
  }
}
